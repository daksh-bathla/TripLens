<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recent Trips | TripLens</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-md p-6">
      <h1 class="text-2xl font-bold text-[#0a8574] mb-10">TripLens</h1>

      <nav class="space-y-5 text-sm">
        <a href="dashboard.html" class="block text-gray-600 hover:text-[#0a8574]">Dashboard</a>
        <a href="trips.recent.html" class="block font-semibold text-[#0a8574] bg-[#e6f7f4] px-3 py-2 rounded-lg">Recent Trips</a>
        <a href="analytics.html" class="block text-gray-600 hover:text-[#0a8574]">Analytics</a>
        <a href="index.html" class="block text-gray-600 hover:text-[#0a8574]">Home</a>
        <button id="logoutBtn" class="block text-red-500 hover:underline mt-6">Logout</button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-10">
      <h2 class="text-3xl font-bold mb-6">Your Recent Trips</h2>

      <div id="tripsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Trip cards will load here -->
      </div>
    </main>

  </div>

  <script>
    const user = localStorage.getItem("triplensUser");

    // Enforce login
    if (!user) {
      alert("Please log in to view your saved trips.");
      window.location.href = "auth.html";
    }

    const tripsContainer = document.getElementById("tripsContainer");

    async function loadTrips() {
      try {
        const response = await fetch("http://localhost:5000/trips");
        const trips = await response.json();

        if (!trips.length) {
          tripsContainer.innerHTML = "<p class='text-gray-500'>No trips saved yet.</p>";
          return;
        }

        tripsContainer.innerHTML = "";

        trips.reverse().forEach(trip => {
          const card = document.createElement("div");
          card.className = "bg-white shadow rounded-xl p-5 border";

          card.innerHTML = `
            <h3 class="text-xl font-semibold mb-2 capitalize">${trip.source} → ${trip.destination}</h3>
            <p class="text-sm text-gray-500 mb-2">Mode: ${trip.mode}</p>
            <p class="text-sm mb-1">Budget: ₹${trip.budget}</p>
            <p class="text-sm mb-1">Risk Score: <span class="font-medium">${trip.riskScore}</span></p>
            <p class="text-sm mb-1">Risk Level: <span class="font-medium">${trip.riskLevel}</span></p>
            <p class="text-xs text-gray-400 mt-3">Created: ${new Date(trip.createdAt).toLocaleDateString()}</p>
            <button data-id="${trip._id}" class="deleteBtn mt-4 text-red-500 text-sm hover:underline">Delete</button>
          `;

          tripsContainer.appendChild(card);
        });

        attachDeleteEvents();

      } catch (err) {
        tripsContainer.innerHTML = "<p class='text-red-500'>Failed to load trips.</p>";
      }
    }

    function attachDeleteEvents() {
      document.querySelectorAll(".deleteBtn").forEach(btn => {
        btn.addEventListener("click", async function() {
          const id = this.getAttribute("data-id");

          await fetch(`http://localhost:5000/trips/${id}`, {
            method: "DELETE"
          });

          loadTrips();
        });
      });
    }

    document.getElementById("logoutBtn").addEventListener("click", function() {
      localStorage.removeItem("triplensUser");
      window.location.href = "index.html";
    });

    loadTrips();
  </script>

</body>
</html>
